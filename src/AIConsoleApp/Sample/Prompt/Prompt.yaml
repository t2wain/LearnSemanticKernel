name: GenerateStory
template: |
   Tell a story about {{topic}} that is {{length}} sentences long.
template_format: handlebars # semantic-kernel, handlebars, or liquid
description: A function that generates a story about a topic.
input_variables:
   - name: topic
     description: The topic of the story.
     is_required: true
     default: ""
     json_schema: ""
     allow_dangerously_set_content: false
   - name: length
     description: The number of sentences in the story.
     is_required: true
output_variable:
   description: The generated story.
   json_schema: ""
execution_settings: # there are 2 settings
   service1:
      model_id: gpt-4 # modelId identifier
      temperature: 0.6
      service_id: "" # serviceId identifier
      function_choice_behavior: "auto" # auto, required, or none
   service2:
      model_id: gpt-3
      temperature: 0.4
default:
   temperature: 0.5